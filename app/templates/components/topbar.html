<header class="topbar glass-panel" role="banner">
    <button class="topbar-toggle d-lg-none" id="mobileSidebarToggle" aria-label="Open navigation menu" aria-expanded="false" aria-controls="sidebar">
        <i class="bi bi-list" aria-hidden="true"></i>
    </button>
    <div class="search-bar" role="search">
        <i class="bi bi-search" aria-hidden="true"></i>
        <input type="search" id="globalSearch"
               placeholder="{{ t('search_placeholder') }}"
               autocomplete="off"
               aria-label="{{ t('search_placeholder') }}"
               aria-autocomplete="list"
               aria-controls="searchResults"
               aria-expanded="false">
        <div class="search-results" id="searchResults" role="listbox" aria-label="Search results"></div>
    </div>
    <div class="topbar-actions">
        <span class="version-badge" aria-label="Version {{ app_version }}">v{{ app_version }}</span>
        <button class="topbar-btn" id="themeToggle" title="Toggle theme (Ctrl+D)" aria-label="Toggle color theme">
            <i class="bi bi-moon-stars-fill" aria-hidden="true"></i>
        </button>
        <div class="dropdown">
            <button class="topbar-btn" data-bs-toggle="dropdown" aria-label="Notifications" aria-haspopup="true" id="notifBtn">
                <i class="bi bi-bell-fill" aria-hidden="true"></i>
                <span class="notif-dot" id="notifDot" {% if not has_dataset %}style="display:none"{% endif %} aria-hidden="true"></span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="notifBtn" id="notifDropdown">
                <li><h6 class="dropdown-header">Notifications</h6></li>
                {% if has_dataset %}
                <li><span class="dropdown-item-text small" id="notifDatasetText">
                    <i class="bi bi-check-circle-fill text-success me-1" aria-hidden="true"></i>Dataset loaded: {{ session_meta.num_students }} students
                </span></li>
                {% else %}
                <li><span class="dropdown-item-text small" id="notifDatasetText">Generate a dataset to begin analysis</span></li>
                {% endif %}
            </ul>
        </div>
        <div class="user-avatar" id="userAvatar" title="{{ session_meta.leader_name or 'Analyst' }}" aria-label="User: {{ session_meta.leader_name or 'Analyst' }}">
            <span id="userAvatarInitial">{{ (session_meta.leader_name or 'A')[:1] | upper }}</span>
        </div>
    </div>
</header>
